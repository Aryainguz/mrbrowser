name: example-search
description: "A simple search flow demonstrating scrolling and clicking"

steps:
  - open:
      url: https://www.youtube.com

  - type:
      target: "Search query"
      value: "Fifa World Cup 2022"
      enter: true

  - wait:
      seconds: 1

  - scroll:
      direction: down
      pixels: 500

  - screenshot:
      output: "search_results.png"
